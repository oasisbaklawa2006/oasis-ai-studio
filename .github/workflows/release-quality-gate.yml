name: Release quality gate

on:
  pull_request:
    branches:
      - main
      - recovery/ai-studio-post-catalogue-baseline-2026-07-12
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run legacy TypeScript gate
        run: npm run typecheck
      - name: Audit real TypeScript project references
        continue-on-error: true
        run: npm run typecheck:build
      - run: npm run build
      - run: npm run test
