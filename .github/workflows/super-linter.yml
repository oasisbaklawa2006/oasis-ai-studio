name: Super-Linter changed files

on:
  pull_request:
    branches:
      - main
      - recovery/ai-studio-post-catalogue-baseline-2026-07-12
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Lint changed files
        uses: super-linter/super-linter@729e0f967409dceb0a898cdd94a5534719f85c36
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          # TypeScript/TSX are intentionally absent from this inclusion list.
          # They use installed dependencies through Reviewdog and Biome.
          VALIDATE_YAML: true
          SAVE_SUPER_LINTER_SUMMARY: false
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: false
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          FILTER_REGEX_EXCLUDE: "(^|/)src/integrations/supabase/types\\.ts$"
