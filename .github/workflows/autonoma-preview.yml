name: Autonoma preview signal

'on':
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Vercel preview URL to report to Autonoma
        required: true
        default: https://oasis-ai-studio-fb1fp1cgw-oasisbaklawa2006-6222s-projects.vercel.app
        type: string
      sha:
        description: Optional commit SHA for the preview
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/autonoma-preview.yml

permissions:
  contents: read

jobs:
  notify:
    name: Notify Autonoma
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    env:
      AUTONOMA_ENDPOINT: https://autonoma.app/v1/onboarding/deployment-signal
      AUTONOMA_APPLICATION_ID: cmrj2lm9l030t01e8yv3eryb0
      AUTONOMA_SHARED_SECRET: ${{ secrets.AUTONOMA_SHARED_SECRET }}
      PREVIEW_URL: ${{ inputs.preview_url || github.event.deployment_status.target_url || 'https://oasis-ai-studio-fb1fp1cgw-oasisbaklawa2006-6222s-projects.vercel.app' }}
      PREVIEW_SHA: ${{ inputs.sha || github.event.deployment.sha || github.sha }}
      PREVIEW_PROVIDER: vercel
    steps:
      - name: Validate deployment signal inputs
        run: |
          SECRET=$(printf '%s' "$AUTONOMA_SHARED_SECRET" | tr -d '\r\n ' | sed 's/^AUTONOMA_SHARED_SECRET=//')

          test -n "$SECRET"
          test -n "$AUTONOMA_APPLICATION_ID"
          test -n "$PREVIEW_URL"

          case "$PREVIEW_URL" in
            http://*|https://*) ;;
            *) echo "PREVIEW_URL is not an HTTP(S) URL: $PREVIEW_URL" >&2; exit 1 ;;
          esac

          if ! printf '%s' "$SECRET" | grep -Eq '^[0-9a-fA-F]{64}$'; then
            echo "AUTONOMA_SHARED_SECRET must be the 64-character raw secret value only." >&2
            echo "Do not include AUTONOMA_SHARED_SECRET=, quotes, spaces, or line breaks." >&2
            exit 1
          fi

      - name: Notify Autonoma
        run: |
          SECRET=$(printf '%s' "$AUTONOMA_SHARED_SECRET" | tr -d '\r\n ' | sed 's/^AUTONOMA_SHARED_SECRET=//')

          BODY=$(jq -nc \
            --arg applicationId "$AUTONOMA_APPLICATION_ID" \
            --arg previewUrl "$PREVIEW_URL" \
            --arg sha "$PREVIEW_SHA" \
            --arg provider "$PREVIEW_PROVIDER" \
            '{applicationId:$applicationId,previewUrl:$previewUrl,provider:$provider}
              + (if $sha == "" then {} else {sha:$sha} end)')

          echo "Sending Autonoma payload:"
          echo "$BODY" | jq '{applicationId, previewUrl, sha, provider}'

          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" -hex | sed 's/^.* //')
          HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/autonoma-response.txt \
            -X POST "$AUTONOMA_ENDPOINT" \
            -H "content-type: application/json" \
            -H "x-signature: $SIG" \
            --data "$BODY")

          echo "Autonoma HTTP status: $HTTP_CODE"
          echo "Autonoma response:"
          cat /tmp/autonoma-response.txt

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            exit 0
          fi

          if grep -q 'Invalid signature' /tmp/autonoma-response.txt; then
            echo "Retrying with hex-key HMAC signature mode."
            SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -mac HMAC -macopt hexkey:"$SECRET" -hex | sed 's/^.* //')
            HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/autonoma-response-hexkey.txt \
              -X POST "$AUTONOMA_ENDPOINT" \
              -H "content-type: application/json" \
              -H "x-signature: $SIG" \
              --data "$BODY")

            echo "Autonoma hex-key HTTP status: $HTTP_CODE"
            echo "Autonoma hex-key response:"
            cat /tmp/autonoma-response-hexkey.txt

            test "$HTTP_CODE" -ge 200 -a "$HTTP_CODE" -lt 300
          else
            exit 1
          fi
