name: Security and code quality

on:
  pull_request:
    branches:
      - main
      - recovery/ai-studio-post-catalogue-baseline-2026-07-12
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc

  semgrep:
    name: Semgrep Community
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install pinned Semgrep
        run: pip install --disable-pip-version-check semgrep==1.169.0
      - name: Scan OWASP, TypeScript and secrets rules
        run: semgrep scan --config p/owasp-top-ten --config p/typescript --config p/secrets --metrics=off --sarif --output semgrep-results.sarif

  trivy:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Generate SARIF report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy findings
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          sarif_file: trivy-results.sarif
      - name: Block unresolved critical vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  reviewdog:
    name: Reviewdog ESLint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - uses: reviewdog/action-eslint@556a3fdaf8b4201d4d74d406013386aa4f7dab96
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_level: error
          eslint_flags: "src scripts e2e"

  deterministic-quality:
    name: Coverage, build and boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run check:boundaries
        env:
          BOUNDARY_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      - run: git diff --check

  biome-changed:
    name: Biome changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:biome:changed
        env:
          QUALITY_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

  knip-inventory:
    name: Knip debt inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Report existing dead-code debt without blocking
        run: npm run quality:dead-code || echo "::warning::Knip found existing debt; review the inventory before deleting anything."
