name: Playwright read-only smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      studio_url:
        description: Protected or public AI Studio preview URL
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: playwright-readonly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  product-authoring-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Verify protected test configuration
        env:
          AI_STUDIO_URL: ${{ vars.AI_STUDIO_TEST_URL || inputs.studio_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          test -n "$AI_STUDIO_URL" || { echo "AI_STUDIO_URL is not configured"; exit 1; }
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET" || { echo "Vercel automation bypass is not configured"; exit 1; }
      - name: Run dry-run UX audit
        run: npm run test:product-authoring-audit
        env:
          AI_STUDIO_URL: ${{ vars.AI_STUDIO_TEST_URL || inputs.studio_url }}
          TEST_STUDIO_EMAIL: ${{ secrets.TEST_STUDIO_EMAIL }}
          TEST_STUDIO_PASSWORD: ${{ secrets.TEST_STUDIO_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PRODUCT_AUTHORING_SAVE: "0"
      - name: Upload read-only audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: product-authoring-read-only-audit
          path: audit-artifacts/product-authoring
          if-no-files-found: warn
          retention-days: 14
