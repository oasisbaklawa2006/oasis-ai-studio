name: Repo Ownership Boundaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-boundaries:
    name: Enforce oasis-ai-studio repo ownership boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the script can diff against origin/main to tell
          # new schema/migration additions apart from pre-existing legacy debt.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check repo ownership boundaries
        run: npm run check:boundaries
